<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <title>Event Feedback System</title>

    <style>
        body {
            font-family: Arial;
            margin: 20px;
        }

        input, select, textarea {
            display: block;
            margin: 10px 0;
            padding: 8px;
            width: 300px;
        }

        #image {
            width: 150px;
            transition: 0.3s;
        }

        #output {
            color: green;
            font-weight: bold;
        }
    </style>
</head>

<body>

<h2>Event Feedback Form</h2>

<!-- Phone number (onblur validation) -->
<input type="text"
       id="phone"
       placeholder="Enter phone number"
       onblur="validatePhone()">

<p id="phoneMsg"></p>

<!-- Dropdown (onchange event) -->
<select id="eventSelect" onchange="showFee()">
    <option value="">Select Event</option>
    <option value="100">Music Event - ₹100</option>
    <option value="200">Food Festival - ₹200</option>
    <option value="150">Tech Meetup - ₹150</option>
</select>

<p id="feeMsg"></p>

<!-- Submit button (onclick event) -->
<button onclick="submitForm()">Submit Feedback</button>

<p id="output"></p>

<!-- Image (double click to enlarge) -->
<br>
<img src="https://picsum.photos/200"
     id="image"
     ondblclick="enlargeImage()"
     alt="Event Image">

<!-- Feedback textarea (keyboard events) -->
<br>
<textarea id="feedback"
          placeholder="Write feedback here..."
          onkeyup="countChars()"></textarea>

<p>Character Count: <span id="charCount">0</span></p>

<script>

    // onblur validation
    function validatePhone() {
        let phone = document.getElementById("phone").value;
        let msg = document.getElementById("phoneMsg");

        if (phone.length === 10) {
            msg.innerHTML = "Valid phone number ✔";
            msg.style.color = "green";
        } else {
            msg.innerHTML = "Invalid phone number ❌ (must be 10 digits)";
            msg.style.color = "red";
        }
    }

    // onchange dropdown
    function showFee() {
        let fee = document.getElementById("eventSelect").value;
        document.getElementById("feeMsg").innerHTML =
            "Selected Event Fee: ₹" + fee;
    }

    // onclick submit
    function submitForm() {
        document.getElementById("output").innerHTML =
            "Feedback submitted successfully ✔";
    }

    // ondblclick enlarge image
    function enlargeImage() {
        let img = document.getElementById("image");
        img.style.width = "300px";
    }

    // keyboard event
    function countChars() {
        let text = document.getElementById("feedback").value;
        document.getElementById("charCount").innerText = text.length;
    }

</script>

</body>

</html>
