<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <title>Community Event Gallery</title>

    <style>
        .event-img {
            width: 150px;
            height: 150px;
            border: 3px solid black;
            border-radius: 8px;
        }

        table {
            margin: 20px;
            border-collapse: collapse;
        }

        caption {
            font-size: 20px;
            font-weight: bold;
            margin-bottom: 10px;
        }

        td {
            padding: 10px;
            text-align: center;
        }
    </style>
</head>

<body>

    <table>

        <!-- Caption -->
        <caption>Past Community Events Gallery</caption>

        <!-- Row 1 -->
        <tr>
            <td>
                <img src="https://picsum.photos/150?1"
                     alt="Music Event"
                     title="Music Night"
                     class="event-img">
            </td>

            <td>
                <img src="https://picsum.photos/150?2"
                     alt="Food Festival"
                     title="Food Festival"
                     class="event-img">
            </td>

            <td>
                <img src="https://picsum.photos/150?3"
                     alt="Tech Meetup"
                     title="Tech Meetup"
                     class="event-img">
            </td>
        </tr>

        <!-- Row 2 -->
        <tr>
            <td>
                <img src="https://picsum.photos/150?4"
                     alt="Sports Day"
                     title="Sports Event"
                     class="event-img">
            </td>

            <td>
                <img src="https://picsum.photos/150?5"
                     alt="Art Exhibition"
                     title="Art Exhibition"
                     class="event-img">
            </td>

            <td>
                <img src="https://picsum.photos/150?6"
                     alt="Cultural Fest"
                     title="Cultural Festival"
                     class="event-img">
            </td>
        </tr>

    </table>

</body>

</html>
