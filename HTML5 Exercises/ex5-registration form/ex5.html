<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <title>Event Registration Form</title>

    <style>
        body {
            font-family: Arial;
            background-color: #f2f2f2;
        }

        .form-container {
            width: 400px;
            margin: 50px auto;
            background: white;
            padding: 20px;
            border-radius: 10px;
            box-shadow: 0px 0px 10px gray;
        }

        input, select, textarea {
            width: 100%;
            padding: 8px;
            margin: 8px 0;
        }

        button {
            background-color: blue;
            color: white;
            padding: 10px;
            border: none;
            width: 100%;
            cursor: pointer;
        }

        output {
            display: block;
            margin-top: 15px;
            font-weight: bold;
            color: green;
        }
    </style>
</head>

<body>

<div class="form-container">

    <h2>Event Registration</h2>

    <form onsubmit="showMessage(event)">

        <!-- Name -->
        <input type="text"
               placeholder="Enter your name"
               required
               autofocus>

        <!-- Email -->
        <input type="email"
               placeholder="Enter your email"
               required>

        <!-- Date -->
        <input type="date"
               required>

        <!-- Event Type -->
        <select required>
            <option value="">Select Event</option>
            <option>Music Event</option>
            <option>Food Festival</option>
            <option>Tech Meetup</option>
            <option>Sports Day</option>
        </select>

        <!-- Message -->
        <textarea placeholder="Your message (optional)"></textarea>

        <!-- Submit -->
        <button type="submit">Register</button>

        <!-- Output -->
        <output id="msg"></output>

    </form>

</div>

<script>
    function showMessage(event) {
        event.preventDefault();
        document.getElementById("msg").value =
            "Registration Successful! Thank you for joining the event.";
    }
</script>

</body>

</html>
