<!DOCTYPE html>
<html>
<head>
    <title>Exercise 12.2 - Pricing</title>
    <link rel="stylesheet" href="../css/bootstrap.min.css">
</head>
<body>

<div class="container mt-5">
    <div class="row text-center">

        <div class="col-md-4 mb-4">
            <div class="card p-4">
                <h4>Basic</h4>
                <p>$10/month</p>
            </div>
        </div>

        <div class="col-md-4 mb-4">
            <div class="card p-4">
                <h4>Standard</h4>
                <p>$20/month</p>
            </div>
        </div>

        <div class="col-md-4 mb-4">
            <div class="card p-4">
                <h4>Premium</h4>
                <p>$30/month</p>
            </div>
        </div>

    </div>
</div>

</body>
</html>
